<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Ferramentaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
:root {
  --bg:#0a0e1a; --surface:#111827; --surface2:#1a2236;
  --border:#1e3a5f; --border2:#2a4a70;
  --accent:#00d4ff; --accent2:#0099cc; --accent-glow:rgba(0,212,255,0.15);
  --yellow:#f59e0b; --green:#10b981; --red:#ef4444;
  --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b;
  --font-head:'Rajdhani',sans-serif; --font-mono:'IBM Plex Mono',monospace; --font-body:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow:hidden;
}

/* GRID BACKGROUND */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}
/* GLOW ORBS */
body::after{
  content:'';
  position:fixed;
  top:-200px;left:-200px;
  width:600px;height:600px;
  background:radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}
.orb2{
  position:fixed;
  bottom:-200px;right:-100px;
  width:500px;height:500px;
  background:radial-gradient(circle, rgba(0,153,204,0.05) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}

/* CARD */
.login-wrapper{
  position:relative;z-index:1;
  width:100%;max-width:440px;
}

/* LOGO */
.login-logo{text-align:center;margin-bottom:32px}
.logo-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--accent-glow);border:1px solid var(--accent);
  border-radius:6px;padding:6px 14px;
  font-family:var(--font-mono);font-size:.7rem;color:var(--accent);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;
}
.logo-badge::before{content:'⬡';font-size:1rem}
.login-logo h1{
  font-family:var(--font-head);font-size:2.2rem;font-weight:700;
  color:#fff;line-height:1;letter-spacing:1px;
}
.login-logo h1 span{color:var(--accent)}
.login-logo p{
  font-family:var(--font-mono);font-size:.7rem;color:var(--text3);
  letter-spacing:2px;text-transform:uppercase;margin-top:8px;
}

/* CARD BOX */
.login-card{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(0,212,255,0.05);
}

/* TABS */
.login-tabs{display:flex;border-bottom:1px solid var(--border)}
.tab-btn{
  flex:1;padding:18px;
  background:none;border:none;
  font-family:var(--font-mono);font-size:.75rem;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
  color:var(--text3);cursor:pointer;transition:all .2s;
  position:relative;
}
.tab-btn::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--accent);transform:scaleX(0);transition:transform .2s;
}
.tab-btn.active{color:var(--accent)}
.tab-btn.active::after{transform:scaleX(1)}
.tab-btn:hover:not(.active){color:var(--text2);background:rgba(255,255,255,.02)}

/* TAB CONTENT */
.tab-content{padding:28px}
.tab-pane{display:none}
.tab-pane.active{display:block}

.tab-title{
  font-family:var(--font-head);font-size:1.5rem;font-weight:700;
  color:#fff;margin-bottom:6px;
}
.tab-title span{color:var(--accent)}
.tab-subtitle{
  font-family:var(--font-mono);font-size:.65rem;color:var(--text3);
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px;
}

/* FORM */
.form-group{margin-bottom:18px}
label{
  display:block;
  font-family:var(--font-mono);font-size:.65rem;color:var(--text3);
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;
}
.form-control{
  width:100%;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:11px 14px;
  color:var(--text);font-size:.88rem;font-family:var(--font-body);
  outline:none;transition:all .2s;
}
.form-control:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.form-control::placeholder{color:var(--text3)}
select.form-control option{background:var(--surface2);color:var(--text)}
.form-hint{font-family:var(--font-mono);font-size:.62rem;color:var(--text3);margin-top:5px;letter-spacing:.5px}

/* BUTTON */
.btn-submit{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;border-radius:8px;
  color:var(--bg);font-family:var(--font-head);
  font-size:1rem;font-weight:700;letter-spacing:1.5px;
  cursor:pointer;transition:all .25s;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:6px;
}
.btn-submit:hover{opacity:.9;box-shadow:0 6px 20px rgba(0,212,255,.3);transform:translateY(-1px)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* MESSAGES */
.msg{
  border-radius:8px;padding:11px 14px;margin-bottom:18px;
  font-family:var(--font-mono);font-size:.75rem;letter-spacing:.5px;
  display:none;align-items:center;gap:8px;
}
.msg.visible{display:flex}
.msg-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fc8181;border-left:3px solid var(--red)}
.msg-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;border-left:3px solid var(--green)}

/* FOOTER LINK */
.tab-footer{
  margin-top:20px;padding-top:18px;border-top:1px solid var(--border);
  text-align:center;font-size:.78rem;color:var(--text3);font-family:var(--font-mono);
}
.tab-footer a{color:var(--accent);cursor:pointer;transition:opacity .2s}
.tab-footer a:hover{opacity:.8;text-decoration:underline}

/* SERVER STATUS */
.server-status{
  margin:0 28px 24px;
  padding:10px 14px;border-radius:8px;
  font-family:var(--font-mono);font-size:.7rem;letter-spacing:.5px;
  text-align:center;border:1px solid var(--border);
  color:var(--text3);background:var(--surface2);
  transition:all .3s;
}
.server-status.online{
  color:var(--green);background:rgba(16,185,129,.08);
  border-color:rgba(16,185,129,.3);
}
.server-status.offline{
  color:var(--red);background:rgba(239,68,68,.08);
  border-color:rgba(239,68,68,.3);
}
    </style>
</head>

    <h1>Ferra<span>mentaria</span></h1>
    <p>// Controle de Ferramental</p>
  </div>

  <!-- CARD -->
  <div class="login-card">

    <!-- TABS -->
    <div class="login-tabs">
      <button class="tab-btn active" onclick="showTab('login')">🔐 Login</button>
      <button class="tab-btn" onclick="showTab('register')">📝 Criar Conta</button>
    </div>

    <!-- TAB: LOGIN -->
    <div class="tab-content">
      <div id="login-tab" class="tab-pane active">
        <div class="tab-title">Acessar <span>Sistema</span></div>
        <div class="tab-subtitle">// Insira suas credenciais</div>

        <div id="login-error" class="msg msg-error"></div>
        <div id="login-success" class="msg msg-success"></div>

        <form id="login-form" onsubmit="login(event)">
          <div class="form-group">
            <label>Usuário</label>
            <input type="text" class="form-control" id="login-username" placeholder="Digite seu usuário" required autocomplete="username">
          </div>
          <div class="form-group">
            <label>Senha</label>
            <input type="password" class="form-control" id="login-password" placeholder="Digite sua senha" required autocomplete="current-password">
            <div class="form-hint">// Senha obrigatória</div>
          </div>
          <button type="submit" class="btn-submit" id="login-btn">
            <span>→</span> Entrar no Sistema
          </button>
        </form>
      </div>

      <!-- TAB: REGISTRO -->
      <div id="register-tab" class="tab-pane">
        <div class="tab-title">Nova <span>Conta</span></div>
        <div class="tab-subtitle">// Preencha os dados abaixo</div>

        <div id="register-error" class="msg msg-error"></div>
        <div id="register-success" class="msg msg-success"></div>

        <form id="register-form" onsubmit="register(event)">
          <div class="form-group">
            <label>Nome Completo *</label>
            <input type="text" class="form-control" id="register-name" placeholder="Seu nome completo" required>
          </div>
          <div class="form-group">
            <label>Nome de Usuário *</label>
            <input type="text" class="form-control" id="register-username" placeholder="Escolha um nome de usuário" required>
            <div class="form-hint">// Será usado para fazer login</div>
          </div>
          <div class="form-group">
            <label>Senha *</label>
            <input type="password" class="form-control" id="register-password" placeholder="Crie uma senha segura" required>
          </div>
          <div class="form-group">
            <label>Código da Empresa *</label>
            <input type="text" class="form-control" id="register-company" placeholder="6 dígitos numéricos" pattern="\d{6}" maxlength="6" required>
            <div class="form-hint">// Exatamente 6 números (ex: 123456)</div>
          </div>
          <div class="form-group">
            <label>Setor</label>
            <select class="form-control" id="register-setor">
              <option value="GERAL">Geral</option>
            </select>
          </div>
          <button type="submit" class="btn-submit" id="register-btn">
            <span>✓</span> Criar Minha Conta
          </button>
        </form>

        <div class="tab-footer">
          Já tem uma conta? <a onclick="showTab('login')">Faça login aqui</a>
        </div>
      </div>
    </div>

    <!-- SERVER STATUS -->
    <div class="server-status" id="server-status">⟳ Testando conexão com servidor...</div>

  </div><!-- /login-card -->
</div><!-- /login-wrapper -->

<script>
// ── STATUS DO SERVIDOR ──
async function checkServerStatus() {
    const el = document.getElementById('server-status');
    try {
        const res = await fetch('/api/health');
        if (res.ok) {
            el.textContent = '✅ Servidor online';
            el.className = 'server-status online';
        } else {
            el.textContent = '⚠️ Servidor com problemas';
            el.className = 'server-status offline';
        }
    } catch(e) {
        el.textContent = '❌ Servidor offline — Verifique se o servidor está rodando';
        el.className = 'server-status offline';
    }
}

// ── TABS ──
function showTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelector(`[onclick="showTab('${tab}')"]`).classList.add('active');
    document.getElementById(`${tab}-tab`).classList.add('active');
    // Limpar mensagens
    ['login-error','login-success','register-error','register-success'].forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove('visible');
        el.textContent = '';
    });
}

function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg msg-${type} visible`;
}
function hideMsg(id) {
    const el = document.getElementById(id);
    el.classList.remove('visible');
}

// ── LOGIN ──
async function login(event) {
    event.preventDefault();
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');
    hideMsg('login-error'); hideMsg('login-success');
    if (!username || !password) { showMsg('login-error','Por favor, preencha todos os campos','error'); return; }
    const orig = btn.innerHTML;
    btn.innerHTML = '⟳ Entrando...'; btn.disabled = true;
    try {
        const res = await fetch('/api/login', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({username, password})
        });
        const result = await res.json();
        if (result.success) {
            localStorage.setItem('currentUser', JSON.stringify(result.user));
            showMsg('login-success','✅ Login bem-sucedido! Redirecionando...','success');
            setTimeout(() => { window.location.href = result.redirect; }, 1000);
        } else {
            showMsg('login-error', result.message || 'Usuário ou senha incorretos', 'error');
        }
    } catch(e) {
        showMsg('login-error','Erro de conexão. Verifique se o servidor está rodando.','error');
    } finally {
        btn.innerHTML = orig; btn.disabled = false;
    }
}

// ── REGISTRO ──
async function register(event) {
    event.preventDefault();
    const name = document.getElementById('register-name').value.trim();
    const username = document.getElementById('register-username').value.trim();
    const password = document.getElementById('register-password').value;
    const companyCode = document.getElementById('register-company').value.trim();
    const setor = document.getElementById('register-setor').value;
    const btn = document.getElementById('register-btn');
    hideMsg('register-error'); hideMsg('register-success');
    if (!name||!username||!password||!companyCode) { showMsg('register-error','Preencha todos os campos obrigatórios','error'); return; }
    if (!/^\d{6}$/.test(companyCode)) { showMsg('register-error','Código da empresa deve ter exatamente 6 números','error'); return; }
    if (password.length < 4) { showMsg('register-error','A senha deve ter pelo menos 4 caracteres','error'); return; }
    const orig = btn.innerHTML;
    btn.innerHTML = '⟳ Criando conta...'; btn.disabled = true;
    try {
        const res = await fetch('/api/register', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({name, username, password, companyCode, setor})
        });
        const result = await res.json();
        if (result.success) {
            showMsg('register-success', result.message||'Conta criada com sucesso!', 'success');
            document.getElementById('register-form').reset();
            setTimeout(() => {
                showTab('login');
                showMsg('login-success','Conta criada! Agora faça login.','success');
            }, 2000);
        } else {
            showMsg('register-error', result.message||'Erro ao criar conta', 'error');
        }
    } catch(e) {
        showMsg('register-error','Erro de conexão com o servidor','error');
    } finally {
        btn.innerHTML = orig; btn.disabled = false;
    }
}

// ── AUTO-FILL ──
function autoFillLogin() {
    document.getElementById('login-username').value = 'admin';
    document.getElementById('login-password').value = 'admin123';
}
function autoFillRegister() {
    document.getElementById('register-name').value = 'Novo Usuário';
    document.getElementById('register-username').value = 'usuario' + Math.floor(Math.random()*1000);
    document.getElementById('register-password').value = '123456';
    document.getElementById('register-company').value = Math.floor(100000 + Math.random()*900000);
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', function() {
    checkServerStatus();

    // Redirecionar se já logado
    try {
        const stored = localStorage.getItem('currentUser');
        if (stored) {
            const user = JSON.parse(stored);
            const redirect = user.role==='ADMIN_GERAL' ? 'index_admin.html'
                           : user.role==='LIDER_CNC'   ? 'index_cnc.html'
                           : 'index_ferramenteiro.html';
            window.location.href = redirect;
            return;
        }
    } catch(e) { localStorage.removeItem('currentUser'); }

    // Atalhos de teclado
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key==='1') showTab('login');
        if (e.ctrlKey && e.key==='2') showTab('register');
        if (e.ctrlKey && e.key==='l') autoFillLogin();
        if (e.ctrlKey && e.key==='r') autoFillRegister();
    });
});
</script>
</body>
</html>
