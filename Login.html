<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Ferramentaria</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a67d8;
        }
        .error {
            color: #e53e3e;
            background: #fed7d7;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        .debug-info {
            margin-top: 20px;
            padding: 10px;
            background: #f7fafc;
            border: 1px solid #cbd5e0;
            border-radius: 5px;
            font-size: 12px;
            color: #4a5568;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 Login - Ferramentaria</h2>
        
        <div id="error-message" class="error"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" required placeholder="Digite seu usuário" value="admin">
            </div>
            
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required placeholder="Digite sua senha" value="admin123">
            </div>
            
            <button type="submit">Entrar</button>
        </form>
        
        <div class="debug-info">
            <div>Servidor: <span id="server-status">Testando conexão...</span></div>
            <div id="api-status"></div>
        </div>
    </div>

    <script>
        // Testar conexão com o servidor
        async function testConnection() {
            try {
                const response = await fetch('/api/health');
                if (response.ok) {
                    document.getElementById('server-status').innerHTML = 
                        '✅ Conectado ao servidor';
                    document.getElementById('server-status').style.color = '#38a169';
                } else {
                    document.getElementById('server-status').innerHTML = 
                        '⚠️ Servidor respondeu com erro';
                    document.getElementById('server-status').style.color = '#dd6b20';
                }
            } catch (error) {
                document.getElementById('server-status').innerHTML = 
                    '❌ Servidor offline. Verifique se o servidor está rodando.';
                document.getElementById('server-status').style.color = '#e53e3e';
            }
        }

        // Testar rota de login
        async function testApi() {
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'test', password: 'test' })
                });
                
                document.getElementById('api-status').innerHTML = 
                    `API Login: ${response.status === 401 ? '✅ Funcionando (401 esperado)' : 
                    response.ok ? '✅ Funcionando' : '⚠️ Status: ' + response.status}`;
                    
            } catch (error) {
                document.getElementById('api-status').innerHTML = 
                    '❌ API não acessível';
            }
        }

        // Executar testes
        testConnection();
        setTimeout(testApi, 1000);

        // Código de login original
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // Mostrar loading
            const button = loginForm.querySelector('button');
            const originalText = button.textContent;
            button.textContent = 'Entrando...';
            button.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();
                console.log('Resposta do servidor:', result);

                if (!response.ok) {
                    errorMessage.textContent = result.message || 'Erro no login';
                    errorMessage.style.display = 'block';
                    return;
                }

                // ✅ REDIRECIONAMENTO PELO PERFIL
                console.log('Redirecionando para:', result.redirect);
                window.location.href = result.redirect;

            } catch (err) {
                console.error('Erro na requisição:', err);
                errorMessage.textContent = 'Servidor offline. Verifique: 1) Servidor rodando 2) Firewall desativado';
                errorMessage.style.display = 'block';
            } finally {
                button.textContent = originalText;
                button.disabled = false;
            }
        });
    </script>
</body>
</html>
