<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Ferramentaria v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI'; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; border-radius: 15px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        h2 { color: #2a5298; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        input:focus { outline: none; border-color: #2a5298; box-shadow: 0 0 0 3px rgba(42,82,152,0.1); }
        button { width: 100%; padding: 14px; background: #2a5298; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:hover { background: #1e3c72; }
        .error { background: #fee; color: #c33; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .success { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .tabs { display: flex; margin-bottom: 30px; border-bottom: 2px solid #eee; }
        .tab { flex: 1; padding: 15px; text-align: center; background: none; border: none; font-size: 1.1rem; cursor: pointer; }
        .tab.active { color: #2a5298; border-bottom: 3px solid #2a5298; font-weight: 600; }
        .tab-content > div { display: none; }
        .tab-content > div.active { display: block; }
        .info-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Sistema de Ferramentaria</h2>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('login')">Login</button>
            <button class="tab" onclick="showTab('register')">Criar Conta</button>
        </div>
        
        <div class="tab-content">
            <!-- LOGIN -->
            <div id="login" class="active">
                <div class="error" id="login-error"></div>
                <div class="success" id="login-success"></div>
                
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="login-username" placeholder="admin" value="admin">
                </div>
                
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="login-password" placeholder="admin123" value="admin123">
                </div>
                
                <button onclick="login()">Entrar</button>
                
                <div class="info-box">
                    <strong>Credenciais padrão:</strong><br>
                    Usuário: <code>admin</code><br>
                    Senha: <code>admin123</code>
                </div>
            </div>
            
            <!-- REGISTRO -->
            <div id="register">
                <div class="error" id="register-error"></div>
                <div class="success" id="register-success"></div>
                
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="register-name" placeholder="Seu nome">
                </div>
                
                <div class="form-group">
                    <label>Nome de Usuário</label>
                    <input type="text" id="register-username" placeholder="usuario123">
                </div>
                
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="register-password" placeholder="Sua senha">
                </div>
                
                <div class="form-group">
                    <label>Código Empresa (6 números)</label>
                    <input type="text" id="register-code" placeholder="123456" maxlength="6">
                </div>
                
                <button onclick="register()">Criar Conta</button>
            </div>
        </div>
    </div>
    
    <script>
        function showTab(tabName) {
            // Atualizar tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[onclick="showTab('${tabName}')"]`).classList.add('active');
            
            // Atualizar conteúdo
            document.querySelectorAll('.tab-content > div').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
        }
        
        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            const successEl = document.getElementById('login-success');
            
            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            
            if (!username || !password) {
                errorEl.textContent = 'Preencha usuário e senha';
                errorEl.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/login?_=' + Date.now(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    successEl.textContent = 'Login realizado! Redirecionando...';
                    successEl.style.display = 'block';
                    localStorage.setItem('currentUser', JSON.stringify(result.user));
                    setTimeout(() => window.location.href = result.redirect, 1000);
                } else {
                    errorEl.textContent = result.message || 'Erro no login';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Servidor offline. Verifique se o Node.js está rodando.';
                errorEl.style.display = 'block';
            }
        }
        
        async function register() {
            const name = document.getElementById('register-name').value;
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            const companyCode = document.getElementById('register-code').value;
            const errorEl = document.getElementById('register-error');
            const successEl = document.getElementById('register-success');
            
            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            
            if (!name || !username || !password || !companyCode) {
                errorEl.textContent = 'Preencha todos os campos';
                errorEl.style.display = 'block';
                return;
            }
            
            if (!/^\d{6}$/.test(companyCode)) {
                errorEl.textContent = 'Código deve ter 6 números';
                errorEl.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/register?_=' + Date.now(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, password, companyCode })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    successEl.textContent = 'Conta criada! Faça login.';
                    successEl.style.display = 'block';
                    setTimeout(() => showTab('login'), 2000);
                } else {
                    errorEl.textContent = result.message || 'Erro ao criar conta';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Erro de conexão';
                errorEl.style.display = 'block';
            }
        }
        
        // Testar conexão
        fetch('/api/health?_=' + Date.now())
            .then(res => {
                console.log('Servidor online:', res.ok);
                if (!res.ok) {
                    document.getElementById('login-error').textContent = 'Servidor com problemas';
                    document.getElementById('login-error').style.display = 'block';
                }
            })
            .catch(err => {
                console.error('Servidor offline');
                document.getElementById('login-error').textContent = 'Servidor offline! Execute: npm start';
                document.getElementById('login-error').style.display = 'block';
            });
    </script>
</body>
</html>
